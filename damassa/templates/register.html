{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="auth-particles" id="particles"></div>

  <div class="auth-card wide" data-aos="fade-up">
    <div class="auth-logo">
      <span class="logo-em">Da</span> Massa
    </div>
    <p class="auth-tagline">Crie sua conta e explore nosso cardápio</p>

    <div class="auth-tabs">
      <button class="auth-tab" onclick="window.location='{{ url_for('login') }}'">🍽️ Entrar</button>
      <button class="auth-tab active">✨ Cadastrar</button>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form" id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" name="full_name" class="form-input" placeholder="Seu nome completo">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nome de Usuário <span class="req">*</span></label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" name="username" class="form-input" placeholder="usuario123" required>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail <span class="req">*</span></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Senha <span class="req">*</span> <small>(mínimo 6 caracteres)</small></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" id="regPassword" class="form-input" placeholder="••••••••" required minlength="6">
          <button type="button" class="toggle-pw" onclick="togglePassword(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength" id="pwStrength">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
      </div>
      <button type="submit" class="btn-submit">
        <span class="btn-text">Criar Conta</span>
      </button>
    </form>

    <p class="auth-footer">
      Já tem conta? <a href="{{ url_for('login') }}">Faça login</a>
    </p>
  </div>
</div>
{% endblock %}
