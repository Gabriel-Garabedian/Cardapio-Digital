{% extends 'base.html' %}
{% block title %}Entrar{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="auth-particles" id="particles"></div>

  <div class="auth-card" data-aos="fade-up">
    <div class="auth-logo">
      <span class="logo-em">Da</span> Massa
    </div>
    <p class="auth-tagline">massas · molhos · momentos</p>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login',this)">
        Entrar
      </button>
      <button class="auth-tab" data-tab="register" onclick="window.location='{{ url_for('register') }}'">
        Cadastrar
      </button>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required>
          <button type="button" class="toggle-pw" onclick="togglePassword(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btnLogin">
        <span class="btn-text">Entrar</span>
        <span class="btn-loader hidden">⏳</span>
      </button>
    </form>

    <p class="auth-footer">
      Não tem conta? <a href="{{ url_for('register') }}">Cadastre-se grátis</a>
    </p>
  </div>
</div>
{% endblock %}
