databases:
  - name: damassa-db
    databaseName: damassa
    plan: free

services:
  - type: web
    name: damassa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/menu
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CHEF_WHATSAPP
        value: "5581989073030"
      - key: PROD
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: damassa-db
          property: connectionString
